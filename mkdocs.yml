site_name: Gnome'un İntikamı
site_description: Vagabonds of Warbonter'in gözünden Brohwar dünyasındaki maceralara ortak olun.
site_url: https://karabibik.github.io/gnomeunintikami/
copyright: Copyright &copy; 2022 - 2026 Mehmet Mert Topaloğlu

# Theme
theme:
    name: 'material'
    custom_dir: overrides
    language: tr
    
    features:
      - navigation.tabs
      - navigation.tabs.sticky
      - navigation.top
      - announce.dismiss
      - search.suggest
      
    palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: red
      accent: orange

# Extensions
markdown_extensions:
  - abbr
  - footnotes
  - attr_list
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.magiclink
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true
  - meta
  - tables
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.blocks.caption
  - neoteroi.timeline
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - obsidian-local-graph
  - search
  - roamlinks 
  - tags
  - glightbox
  - minify:
      minify_html: true
  - social:
      cards: true
      cards_layout_options:
        #logo: docs/Görseller/Haritalar/World_Map.webp
        background_color: "#1a1a1add"   # Dark background
        color: "#ffffff"              # White text
        background_image: docs/Görseller/Haritalar/World_Map.webp
        #background_color: transparent
  
# Extra JS
extra_javascript:
  - https://fastly.jsdelivr.net/npm/jquery/dist/jquery.min.js
  - https://fastly.jsdelivr.net/npm/echarts/dist/echarts.min.js
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - https://cdnjs.cloudflare.com/ajax/libs/tablesort/5.2.1/tablesort.min.js
  - javascripts/tablesort.js
  - javascripts/interactive_graph.js

# Extra CSS
extra_css:
  - stylesheets/extra.css
  - css/neoteroi-mkdocs.css
  - stylesheets/css-v1.1.2.css
  - stylesheets/interactive_graph.css
